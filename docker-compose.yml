services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: qualiopi
      POSTGRES_PASSWORD: qualiopi
      POSTGRES_DB: qualiopi
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Conversion DOCX → PDF (LibreOffice embarqué, sans install locale)
  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    ports:
      - "3001:3000"
    command:
      - gotenberg
      - --api-timeout=120s

  # Interface web PostgreSQL (Adminer)
  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  # Signatures électroniques (open source) — http://localhost:3002
  docuseal:
    image: docuseal/docuseal:latest
    restart: unless-stopped
    ports:
      - "3002:3000"
    volumes:
      - docuseal_data:/data
    environment:
      DATABASE_URL: sqlite3:///data/docuseal.db
      SECRET_KEY_BASE: ${DOCUSEAL_SECRET_KEY:-dev-docuseal-secret-change-in-production}

volumes:
  postgres_data:
  docuseal_data:
