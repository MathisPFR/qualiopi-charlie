services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: qualiopi
      POSTGRES_PASSWORD: qualiopi
      POSTGRES_DB: qualiopi
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Conversion DOCX → PDF (LibreOffice embarqué, sans install locale)
  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    ports:
      - "3001:3000"
    command:
      - gotenberg
      - --api-timeout=120s

volumes:
  postgres_data:
